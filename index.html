<!DOCTYPE html>

<head>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    max-width: 520px;
    text-align: center;
    transition: opacity 0.4s ease;
  }
  .quote.fade { opacity: 0; }
</style>
</head>
<body>
  <p class="quote" id="quote"></p>

  "I feel like all my kids grew up and then they married each other. It's every parent's dream.",
  "There's no 'I' in team, but there is an 'I' in pie. And there's an 'I' in meat pie. Anagram of meat is team. I don't know what I'm saying.",

  "I live by one rule: No office romances, no way. Very messy, inappropriate... no. But I live by another rule: Just do it. Nike.",

  "I would not say I am the world's best boss. I would say that I am one of the top... ones.",
  "I always say, if you can make just one person smile today, you've wasted the rest of your day.",
  "It's a beautiful day. The sun is shining, the birds are singing. And I am the king of the world.",
  "I am not the kind of guy who says, 'I told you so.' But I am the kind of guy who thinks it very loudly.",
  "Identity theft is not a joke, Jim! Millions of families suffer every year!",
  "I am so lucky to have been raised right. My mother always said: Michael, if you can dream it, you can do it. And I dreamed of being the world's best boss. So here we are.",

function getHourlyIndex() {
  return Math.floor(Date.now() / 3600000) % quotes.length;
}

function getSecondsUntilNextHour() {
  const now = new Date();
  return 3600 - (now.getMinutes() * 60 + now.getSeconds());
}

document.getElementById('quote').textContent = '\u201c' + quotes[getHourlyIndex()] + '\u201d';

let secondsLeft = getSecondsUntilNextHour();
setInterval(() => {
  secondsLeft--;
  if (secondsLeft <= 0) {
    secondsLeft = 3600;
    const el = document.getElementById('quote');
    el.classList.add('fade');
    setTimeout(() => {
      el.textContent = '\u201c' + quotes[getHourlyIndex()] + '\u201d';
      el.classList.remove('fade');
    }, 400);
  }
}, 1000);
</script>
</body>
</html>
